<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>파이썬 기초 학습</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR', -apple-system, sans-serif; background: #f5f5f5; color: #1a1a1a; min-height: 100vh; }

    /* ── NAV ── */
    .nav { background: #fff; border-bottom: 1px solid #e0e0e0; position: sticky; top: 0; z-index: 100; }
    .nav-inner { max-width: 1100px; margin: 0 auto; padding: 0 16px; display: flex; align-items: center; gap: 4px; height: 48px; }
    .nav-logo { font-size: 14px; font-weight: 700; margin-right: 16px; color: #1a1a1a; text-decoration: none; }
    .nav-link { font-size: 13px; padding: 6px 12px; border-radius: 8px; text-decoration: none; color: #888; transition: background 0.12s; }
    .nav-link:hover { background: #f5f5f5; color: #1a1a1a; }
    .nav-link.active { background: #1a1a1a; color: #fff; }

    /* ── LAYOUT ── */
    .page { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .subtitle { font-size: 14px; color: #666; margin-bottom: 24px; }
    .wrap { display: flex; height: 700px; border: 1px solid #e0e0e0; border-radius: 12px; overflow: hidden; background: #fff; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }

    /* ── SIDEBAR ── */
    .sidebar { width: 210px; border-right: 1px solid #e0e0e0; overflow-y: auto; flex-shrink: 0; background: #fafafa; }
    .sidebar-header { padding: 14px 16px; border-bottom: 1px solid #e0e0e0; }
    .sidebar-header p { font-size: 11px; font-weight: 700; color: #999; letter-spacing: 0.06em; text-transform: uppercase; }
    .lesson-item { padding: 10px 16px; cursor: pointer; border-left: 2px solid transparent; display: flex; align-items: center; gap: 10px; transition: background 0.12s; }
    .lesson-item:hover { background: #fff; }
    .lesson-item.active { background: #fff; border-left: 2px solid #1a1a1a; }
    .lesson-icon { width: 30px; height: 30px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; background: #fff; border: 1px solid #e0e0e0; }
    .lesson-item.active .lesson-icon { background: #1a1a1a; border-color: #1a1a1a; }
    .lesson-label { font-size: 13px; color: #1a1a1a; line-height: 1.3; font-weight: 500; }

    /* ── MAIN ── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .tabs { display: flex; border-bottom: 1px solid #e0e0e0; padding: 0 20px; flex-shrink: 0; background: #fff; }
    .tab-btn { border: none; background: none; padding: 13px 0; margin-right: 24px; font-size: 13px; cursor: pointer; color: #888; border-bottom: 2px solid transparent; font-weight: 400; font-family: inherit; transition: color 0.12s; }
    .tab-btn.active { color: #1a1a1a; border-bottom: 2px solid #1a1a1a; font-weight: 700; }
    .content { flex: 1; overflow-y: auto; padding: 24px 28px; }

    /* ── LEARN CONTENT STYLES ── */
    .lesson-badge { display: inline-block; font-size: 11px; padding: 3px 9px; border-radius: 99px; background: #f0f0f0; color: #888; margin-bottom: 10px; }
    .lesson-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }

    .learn-subtitle { font-size: 14px; font-weight: 700; color: #1a1a1a; margin: 24px 0 12px; display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
    .learn-subtitle::after { content: ''; flex: 1; height: 1px; background: #e8e8e8; }
    .learn-subtitle .toggle-icon { font-size: 11px; color: #aaa; margin-left: 4px; transition: transform 0.2s; }
    .learn-subtitle.collapsed .toggle-icon { transform: rotate(-90deg); }
    .collapsible-body { overflow: hidden; transition: max-height 0.3s ease; }
    .collapsible-body.collapsed { max-height: 0 !important; }

    /* callouts */
    .callout { border-radius: 8px; padding: 12px 16px; margin: 0 0 16px; display: flex; gap: 12px; font-size: 13px; line-height: 1.7; }
    .callout-info { background: #f0f7ff; border: 1px solid #c5deff; }
    .callout-warn { background: #fffbec; border: 1px solid #f0e0a0; }
    .callout-tip  { background: #f0faf4; border: 1px solid #b2e0c5; }
    .callout-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
    .callout-body { color: #555; }
    .callout-body strong { color: #1a1a1a; }

    /* code blocks */
    .code-wrap { margin: 0 0 16px; border-radius: 8px; overflow: hidden; border: 1px solid #e0e0e0; }
    .code-header { background: #f5f5f5; padding: 7px 14px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e0e0e0; }
    .code-filename { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #888; }
    .copy-btn { font-size: 11px; background: #fff; border: 1px solid #ddd; border-radius: 4px; padding: 2px 8px; color: #666; cursor: pointer; font-family: inherit; transition: background 0.12s; }
    .copy-btn:hover { background: #e8e8e8; }
    .copy-btn.copied { background: #e8f5e9; border-color: #a5d6a7; color: #2e7d32; }
    pre.code-block { background: #f8f8f8; padding: 14px 16px; font-family: 'JetBrains Mono', monospace; font-size: 12.5px; line-height: 1.75; overflow-x: auto; color: #1a1a1a; margin: 0; }
    .kw   { color: #d73a49; }
    .fn   { color: #6f42c1; }
    .str  { color: #032f62; }
    .num  { color: #005cc5; }
    .cmt  { color: #6a737d; font-style: italic; }
    .var  { color: #e36209; }
    .cls  { color: #e36209; font-weight: 600; }

    /* output */
    .output-box { background: #f0fff4; border: 1px solid #c3e6cb; border-left: 3px solid #28a745; border-radius: 0 6px 6px 0; padding: 10px 14px; margin: -12px 0 16px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #155724; }
    .output-label { font-size: 10px; color: #888; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; font-family: 'Noto Sans KR', sans-serif; }

    /* table */
    .data-table { width: 100%; border-collapse: collapse; font-size: 13px; margin: 0 0 16px; border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden; }
    .data-table th { background: #f5f5f5; padding: 9px 12px; text-align: left; font-size: 11px; font-weight: 700; color: #666; letter-spacing: 0.05em; text-transform: uppercase; border-bottom: 1px solid #e0e0e0; }
    .data-table td { padding: 9px 12px; border-bottom: 1px solid #f0f0f0; color: #333; }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: #fafafa; }
    .data-table td code { background: #eef2ff; color: #3730a3; padding: 1px 5px; border-radius: 3px; font-family: 'JetBrains Mono', monospace; font-size: 11.5px; }

    /* op chips */
    .op-chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 0 0 16px; }
    .op-chip { background: #fff; border: 1px solid #e0e0e0; border-radius: 7px; padding: 6px 12px; font-family: 'JetBrains Mono', monospace; font-size: 12.5px; color: #c55; display: flex; align-items: center; gap: 6px; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
    .op-chip span { color: #888; font-size: 12px; font-family: 'Noto Sans KR', sans-serif; }

    /* truth table */
    .truth-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 0 0 16px; }
    .truth-table { border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden; font-size: 12px; }
    .truth-table th { background: #f5f5f5; padding: 7px 10px; color: #666; font-size: 11px; font-weight: 700; border-bottom: 1px solid #e0e0e0; }
    .truth-table td { padding: 7px 10px; border-bottom: 1px solid #f0f0f0; font-family: 'JetBrains Mono', monospace; text-align: center; }
    .truth-table tr:last-child td { border-bottom: none; }
    .t-true  { color: #166534; font-weight: 700; }
    .t-false { color: #991b1b; font-weight: 700; }

    /* flow */
    .flow-diagram { display: flex; align-items: center; flex-wrap: wrap; gap: 0; background: #fafafa; border: 1px solid #e8e8e8; border-radius: 10px; padding: 16px; margin: 0 0 16px; justify-content: center; }
    .flow-step { background: #fff; border: 1px solid #e0e0e0; border-radius: 7px; padding: 10px 14px; font-size: 12px; font-weight: 600; text-align: center; min-width: 90px; }
    .flow-step small { display: block; font-size: 10px; color: #999; margin-top: 2px; font-weight: 400; }
    .flow-step.hl { border-color: #6366f1; background: #eef2ff; color: #4f46e5; }
    .flow-arrow { color: #ccc; font-size: 16px; padding: 0 4px; }

    /* concept cards */
    .concept-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin: 0 0 16px; }
    .concept-card { background: #fafafa; border: 1px solid #e8e8e8; border-top: 3px solid #e8e8e8; border-radius: 8px; padding: 14px; }
    .concept-card.blue  { border-top-color: #3b82f6; }
    .concept-card.green { border-top-color: #22c55e; }
    .concept-card.purple{ border-top-color: #a855f7; }
    .concept-card.orange{ border-top-color: #f97316; }
    .concept-card.red   { border-top-color: #ef4444; }
    .concept-card h4 { font-size: 13px; font-weight: 700; margin-bottom: 6px; }
    .concept-card p { font-size: 12px; color: #666; line-height: 1.6; }
    .concept-card code { background: #eef2ff; color: #4338ca; padding: 1px 4px; border-radius: 3px; font-family: 'JetBrains Mono', monospace; font-size: 11px; }

    /* next btn */
    .next-btn-wrap { margin-top: 28px; padding-top: 20px; border-top: 1px solid #e8e8e8; display: flex; gap: 8px; }

    /* ── EXERCISE STYLES ── */
    .badge { display: inline-block; font-size: 11px; padding: 3px 9px; border-radius: 99px; background: #f0f0f0; color: #888; margin-bottom: 14px; }
    .q-box { background: #f8f8f8; border: 1px solid #e8e8e8; border-radius: 8px; padding: 14px 16px; font-size: 13px; line-height: 1.75; margin-bottom: 16px; }
    .hint-box { background: #fffbec; border: 1px solid #f0e0a0; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #7a5f00; margin-bottom: 14px; }
    textarea.code-input { width: 100%; min-height: 150px; font-family: 'JetBrains Mono', monospace; font-size: 12px; line-height: 1.7; padding: 12px 14px; border-radius: 8px; border: 1px solid #ddd; background: #f8f8f8; color: #1a1a1a; resize: vertical; outline: none; transition: border 0.15s; }
    textarea.code-input:focus { border-color: #1a1a1a; background: #fff; }
    .btn-row { display: flex; gap: 8px; margin-top: 12px; }
    button { padding: 8px 16px; border-radius: 8px; border: 1px solid #ddd; background: #fff; font-size: 13px; cursor: pointer; color: #1a1a1a; transition: background 0.12s; font-family: inherit; }
    button:hover { background: #f0f0f0; }
    button.primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
    button.primary:hover { background: #333; }
    .feedback-box { margin-top: 16px; background: #f0faf4; border: 1px solid #b2e0c5; border-radius: 8px; padding: 14px 16px; }
    .feedback-label { font-size: 12px; font-weight: 700; color: #1e7a44; margin-bottom: 6px; }
    .feedback-text { font-size: 13px; line-height: 1.75; color: #1e5c33; }
    .error-box { margin-top: 16px; background: #fff0f0; border: 1px solid #ffc0c0; border-radius: 8px; padding: 14px 16px; font-size: 13px; color: #c00; }
    .loading-box { padding: 14px 0; font-size: 13px; color: #888; }

    @media (max-width: 640px) {
      .truth-grid { grid-template-columns: 1fr; }
      .wrap { height: auto; flex-direction: column; }
      .sidebar { width: 100%; height: 120px; border-right: none; border-bottom: 1px solid #e0e0e0; display: flex; overflow-x: auto; }
      .sidebar-header { display: none; }
    }
  </style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a class="nav-logo" href="/">🐍 Python Class</a>
    <a class="nav-link active" href="/index.html">파이썬 학습</a>
    <a class="nav-link" href="/guide.html">배포 가이드</a>
  </div>
</nav>
<div class="page">
  <h1>🐍 파이썬 기초 학습</h1>
  <p class="subtitle">개념을 배우고, 직접 코드를 작성해 AI 피드백을 받아보세요</p>
  <div class="wrap">
    <div class="sidebar">
      <div class="sidebar-header"><p>커리큘럼</p></div>
      <div id="lesson-list"></div>
    </div>
    <div class="main">
      <div class="tabs">
        <button class="tab-btn active" id="tab-learn" onclick="switchTab('learn')">개념 학습</button>
        <button class="tab-btn" id="tab-exercise" onclick="switchTab('exercise')">연습 문제</button>
      </div>
      <div class="content" id="main-content"></div>
    </div>
  </div>
</div>

<script>
/* ─────────────────────────────────────────
   헬퍼
───────────────────────────────────────── */
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function codeBlock(filename, code){
  const id = 'cb_' + Math.random().toString(36).slice(2);
  return `<div class="code-wrap">
    <div class="code-header">
      <span class="code-filename">${filename}</span>
      <button class="copy-btn" onclick="copyCode('${id}',this)">복사</button>
    </div>
    <pre class="code-block" id="${id}">${code}</pre>
  </div>`;
}

function callout(type, icon, html){
  return `<div class="callout callout-${type}"><span class="callout-icon">${icon}</span><div class="callout-body">${html}</div></div>`;
}

function subtitle(text){
  return `<div class="learn-subtitle" onclick="toggleSection(this)">
    ${text} <span class="toggle-icon">▼</span>
  </div><div class="collapsible-body">`;
}
const endSection = `</div>`; // closes collapsible-body

/* ─────────────────────────────────────────
   레슨 데이터
───────────────────────────────────────── */
const lessons = [
  /* ══ 01. 변수와 자료형 ══ */
  {
    id: 1, label: "변수와 자료형", icon: "📦",
    learnHTML: () => `
      ${callout('info','💡','<strong>변수(Variable)</strong>는 데이터를 저장하고 나중에 참조하기 위한 <strong>기억 공간</strong>입니다.<br>대입 연산자 <code>=</code>를 사용해 값을 저장합니다.')}

      ${subtitle('🗂 파이썬 자료형 종류')}
      <table class="data-table">
        <thead><tr><th>구분</th><th>자료형</th><th>예시</th><th>특징</th></tr></thead>
        <tbody>
          <tr><td>단일형</td><td><strong>정수형</strong> int</td><td><code>-100, 0, 100</code></td><td>소수점 없는 정수</td></tr>
          <tr><td>단일형</td><td><strong>실수형</strong> float</td><td><code>-3.5, 1.246</code></td><td>소수점 포함 실수</td></tr>
          <tr><td>단일형</td><td><strong>문자열형</strong> str</td><td><code>'hello', "정보"</code></td><td>따옴표로 감싸서 표현</td></tr>
          <tr><td>단일형</td><td><strong>불리언형</strong> bool</td><td><code>True, False</code></td><td>참/거짓 판단 자료</td></tr>
          <tr><td>컨테이너</td><td><strong>리스트</strong> list</td><td><code>[1, 2, 3]</code></td><td>순서 있음, 변경 가능, 대괄호</td></tr>
          <tr><td>컨테이너</td><td><strong>튜플</strong> tuple</td><td><code>(10, 20, 30)</code></td><td>괄호로 묶음, 수정 불가</td></tr>
          <tr><td>컨테이너</td><td><strong>딕셔너리</strong> dict</td><td><code>{'사과':'apple'}</code></td><td>키:값 쌍, 순서 있음</td></tr>
          <tr><td>컨테이너</td><td><strong>집합</strong> set</td><td><code>{'Python', 'Java'}</code></td><td>순서 없음, 중복 불가</td></tr>
        </tbody>
      </table>
      ${endSection}

      ${subtitle('💻 코드 예시 — 자료형 확인')}
      ${codeBlock('자료형 확인.py', `<span class="var">a</span> = <span class="num">100</span>          <span class="cmt"># int</span>
<span class="var">b</span> = <span class="num">3.1415</span>       <span class="cmt"># float</span>
<span class="var">c</span> = <span class="str">'Python'</span>     <span class="cmt"># str</span>
<span class="var">d</span> = <span class="kw">True</span>         <span class="cmt"># bool</span>

<span class="fn">print</span>(<span class="var">a</span>, <span class="fn">type</span>(<span class="var">a</span>))
<span class="fn">print</span>(<span class="var">b</span>, <span class="fn">type</span>(<span class="var">b</span>))
<span class="fn">print</span>(<span class="var">c</span>, <span class="fn">type</span>(<span class="var">c</span>))
<span class="fn">print</span>(<span class="var">d</span>, <span class="fn">type</span>(<span class="var">d</span>))`)}
      <div class="output-box">
        <div class="output-label">▶ 실행 결과</div>
        100 &lt;class 'int'&gt;<br>3.1415 &lt;class 'float'&gt;<br>Python &lt;class 'str'&gt;<br>True &lt;class 'bool'&gt;
      </div>
      ${endSection}

      ${subtitle('🔢 산술 연산자')}
      <div class="op-chips">
        <div class="op-chip"><code>+</code><span>덧셈</span></div>
        <div class="op-chip"><code>-</code><span>뺄셈</span></div>
        <div class="op-chip"><code>*</code><span>곱셈</span></div>
        <div class="op-chip"><code>/</code><span>나눗셈</span></div>
        <div class="op-chip"><code>//</code><span>몫</span></div>
        <div class="op-chip"><code>%</code><span>나머지</span></div>
        <div class="op-chip"><code>**</code><span>거듭제곱</span></div>
        <div class="op-chip" style="color:#7c3aed"><code>+=</code><span>x = x+n</span></div>
        <div class="op-chip" style="color:#7c3aed"><code>-=</code><span>x = x-n</span></div>
        <div class="op-chip" style="color:#7c3aed"><code>*=</code><span>x = x*n</span></div>
      </div>
      ${endSection}

      ${subtitle('⚡ 논리 연산자 진리표')}
      <div class="truth-grid">
        <table class="truth-table"><thead><tr><th>A</th><th>B</th><th>A AND B</th></tr></thead>
          <tbody>
            <tr><td class="t-false">False</td><td class="t-false">False</td><td class="t-false">False</td></tr>
            <tr><td class="t-false">False</td><td class="t-true">True</td><td class="t-false">False</td></tr>
            <tr><td class="t-true">True</td><td class="t-false">False</td><td class="t-false">False</td></tr>
            <tr><td class="t-true">True</td><td class="t-true">True</td><td class="t-true">True</td></tr>
          </tbody>
        </table>
        <table class="truth-table"><thead><tr><th>A</th><th>B</th><th>A OR B</th></tr></thead>
          <tbody>
            <tr><td class="t-false">False</td><td class="t-false">False</td><td class="t-false">False</td></tr>
            <tr><td class="t-false">False</td><td class="t-true">True</td><td class="t-true">True</td></tr>
            <tr><td class="t-true">True</td><td class="t-false">False</td><td class="t-true">True</td></tr>
            <tr><td class="t-true">True</td><td class="t-true">True</td><td class="t-true">True</td></tr>
          </tbody>
        </table>
        <table class="truth-table"><thead><tr><th>A</th><th>NOT A</th></tr></thead>
          <tbody>
            <tr><td class="t-true">True</td><td class="t-false">False</td></tr>
            <tr><td class="t-false">False</td><td class="t-true">True</td></tr>
          </tbody>
        </table>
      </div>
      ${endSection}

      ${callout('warn','⚠️','<strong>TypeError 주의!</strong> 정수(int)와 문자열(str)을 <code>+</code>로 연산할 수 없습니다.<br>숫자를 입력받을 때는 반드시 <code>int(input(...))</code>로 변환하세요.')}
    `,
    exercise: { q: "본인의 이름, 나이, 좋아하는 과목을 각각 변수에 저장하고 print()로 출력하는 코드를 작성하세요.", hint: "name, age, subject 변수를 만들어 값을 할당하고 print(name), print(age), print(subject)를 써보세요." }
  },

      ${callout('tip','📌','여러 개의 1차원 데이터가 모이면 <strong>2차원 데이터</strong>가 됩니다. 행(row)과 열(column)로 표현합니다.')}
      ${codeBlock('2차원 리스트.py', `<span class="cmt"># 6×6 크기의 0으로 채워진 2차원 리스트</span>
<span class="var">maps</span> = [[<span class="num">0</span> <span class="kw">for</span> <span class="var">i</span> <span class="kw">in</span> <span class="fn">range</span>(<span class="num">6</span>)] <span class="kw">for</span> <span class="var">i</span> <span class="kw">in</span> <span class="fn">range</span>(<span class="num">6</span>)]

<span class="cmt"># 행[row], 열[col]로 접근</span>
<span class="var">maps</span>[<span class="num">2</span>][<span class="num">0</span>] = <span class="num">1</span>   <span class="cmt"># 3행 1열의 값 변경</span>

<span class="cmt"># 2중 for문으로 전체 출력</span>
<span class="kw">for</span> <span class="var">row</span> <span class="kw">in</span> <span class="var">maps</span>:
    <span class="kw">for</span> <span class="var">cell</span> <span class="kw">in</span> <span class="var">row</span>:
        <span class="fn">print</span>(<span class="str">'■'</span> <span class="kw">if</span> <span class="var">cell</span> <span class="kw">else</span> <span class="str">'□'</span>, end=<span class="str">''</span>)
    <span class="fn">print</span>()`)}
      ${endSection}
    `,
    exercise: { q: "5개의 숫자가 담긴 리스트를 만들고, 리스트의 합계, 최댓값, 최솟값을 각각 출력하는 코드를 작성하세요.", hint: "sum(), max(), min() 내장 함수를 활용해 보세요." }
  },

  /* ══ 06. 딕셔너리 ══ */
  {
    id: 6, label: "딕셔너리", icon: "📖",
    learnHTML: () => `
      ${callout('info','💡','<strong>딕셔너리</strong>는 <code>키(key): 값(value)</code> 쌍으로 데이터를 저장합니다.<br>키로 값을 빠르게 찾을 수 있습니다.')}

      ${subtitle('① 딕셔너리 기본 조작')}
      ${codeBlock('딕셔너리 기본.py', `<span class="var">T_size</span> = {<span class="str">'남비'</span>:<span class="num">95</span>, <span class="str">'미조'</span>:<span class="num">85</span>, <span class="str">'민지'</span>:<span class="num">100</span>}

<span class="cmt"># 키로 값 가져오기</span>
<span class="fn">print</span>(<span class="var">T_size</span>[<span class="str">'남비'</span>])     <span class="cmt"># → 95</span>

<span class="cmt"># 값 수정</span>
<span class="var">T_size</span>[<span class="str">'남비'</span>] = <span class="num">100</span>

<span class="cmt"># 새 키:값 추가</span>
<span class="var">T_size</span>[<span class="str">'새우'</span>] = <span class="num">105</span>

<span class="fn">print</span>(<span class="var">T_size</span>)`)}
      ${endSection}

      ${subtitle('② 딕셔너리 메서드')}
      <table class="data-table">
        <thead><tr><th>메서드</th><th>반환 값</th><th>예시</th></tr></thead>
        <tbody>
          <tr><td><code>.keys()</code></td><td>키만 반환</td><td><code>for k in d.keys():</code></td></tr>
          <tr><td><code>.values()</code></td><td>값만 반환</td><td><code>for v in d.values():</code></td></tr>
          <tr><td><code>.items()</code></td><td>(키, 값) 쌍 반환</td><td><code>for k, v in d.items():</code></td></tr>
        </tbody>
      </table>
      ${codeBlock('딕셔너리 순회.py', `<span class="var">menu</span> = {<span class="str">'아메리카노'</span>:<span class="num">4000</span>, <span class="str">'라떼'</span>:<span class="num">4500</span>, <span class="str">'모카'</span>:<span class="num">5000</span>}

<span class="kw">for</span> <span class="var">name</span>, <span class="var">price</span> <span class="kw">in</span> <span class="var">menu</span>.items():
    <span class="fn">print</span>(f<span class="str">"{name}: {price}원"</span>)`)}
      <div class="output-box">
        <div class="output-label">▶ 실행 결과</div>
        아메리카노: 4000원<br>라떼: 4500원<br>모카: 5000원
      </div>
      ${endSection}

      ${subtitle('③ 딕셔너리 활용')}
      ${codeBlock('딕셔너리 활용.py', `<span class="var">student</span> = {
    <span class="str">"name"</span>: <span class="str">"홍길동"</span>,
    <span class="str">"age"</span>: <span class="num">20</span>,
    <span class="str">"grade"</span>: <span class="str">"A"</span>,
    <span class="str">"score"</span>: <span class="num">95</span>
}

<span class="cmt"># 전체 정보 출력</span>
<span class="kw">for</span> <span class="var">key</span>, <span class="var">val</span> <span class="kw">in</span> <span class="var">student</span>.items():
    <span class="fn">print</span>(f<span class="str">"{key}: {val}"</span>)

<span class="cmt"># 특정 값 조회</span>
<span class="fn">print</span>(<span class="str">"이름:"</span>, <span class="var">student</span>[<span class="str">"name"</span>])`)}
      ${endSection}
    `,
    exercise: { q: "본인의 정보(이름, 나이, 취미, 좋아하는 색)를 딕셔너리로 만들고, for문으로 모든 키와 값을 출력하는 코드를 작성하세요.", hint: "info = {'name': ..., ...} 를 만들고 for k, v in info.items(): 로 순회해보세요." }
  }
];

/* ─────────────────────────────────────────
   상태
───────────────────────────────────────── */
let currentLesson = 0, currentTab = 'learn', showHint = false;

/* ─────────────────────────────────────────
   인터랙션
───────────────────────────────────────── */
function copyCode(id, btn) {
  const pre = document.getElementById(id);
  const text = pre ? pre.innerText : '';
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ 복사됨';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '복사'; btn.classList.remove('copied'); }, 1800);
  }).catch(() => {
    btn.textContent = '실패';
    setTimeout(() => { btn.textContent = '복사'; }, 1500);
  });
}

function toggleSection(el) {
  el.classList.toggle('collapsed');
  const body = el.nextElementSibling;
  if (body && body.classList.contains('collapsible-body')) {
    if (body.classList.contains('collapsed')) {
      body.style.maxHeight = body.scrollHeight + 'px';
      body.classList.remove('collapsed');
    } else {
      body.style.maxHeight = body.scrollHeight + 'px';
      requestAnimationFrame(() => { body.classList.add('collapsed'); });
    }
  }
}

function initCollapsibles() {
  document.querySelectorAll('.collapsible-body').forEach(body => {
    body.style.maxHeight = body.scrollHeight + 'px';
  });
}

/* ─────────────────────────────────────────
   렌더링
───────────────────────────────────────── */
function renderSidebar() {
  document.getElementById('lesson-list').innerHTML = lessons.map((l, i) => `
    <div class="lesson-item ${i===currentLesson?'active':''}" onclick="selectLesson(${i})">
      <div class="lesson-icon">${l.icon}</div>
      <span class="lesson-label">${l.label}</span>
    </div>`).join('');
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-learn').className = 'tab-btn' + (tab==='learn' ? ' active' : '');
  document.getElementById('tab-exercise').className = 'tab-btn' + (tab==='exercise' ? ' active' : '');
  renderContent();
}

function selectLesson(i) {
  currentLesson = i; showHint = false;
  renderSidebar(); switchTab('learn');
}

function renderContent() {
  const lesson = lessons[currentLesson];
  const el = document.getElementById('main-content');

  if (currentTab === 'learn') {
    el.innerHTML = `
      <span class="lesson-badge">단원 ${currentLesson+1} / ${lessons.length}</span>
      <div class="lesson-title">${lesson.icon} ${lesson.label}</div>
      ${lesson.learnHTML()}
      <div class="next-btn-wrap">
        <button class="primary" onclick="switchTab('exercise')">연습 문제 풀기 →</button>
      </div>`;
    setTimeout(initCollapsibles, 10);
  } else {
    el.innerHTML = `
      <span class="badge">✏️ 연습 문제</span>
      <div class="lesson-title">${lesson.icon} ${lesson.label}</div>
      <div class="q-box">${lesson.exercise.q}</div>
      <div id="hint-area" style="display:${showHint?'block':'none'}">
        <div class="hint-box">💡 힌트: ${lesson.exercise.hint}</div>
      </div>
      <textarea class="code-input" id="student-code" placeholder="# 여기에 파이썬 코드를 작성하세요&#10;"></textarea>
      <div class="btn-row">
        <button class="primary" onclick="submitCode()">채점하기</button>
        <button onclick="toggleHint()">힌트 보기</button>
      </div>
      <div id="feedback-area"></div>`;
  }
}

function toggleHint() {
  showHint = !showHint;
  const el = document.getElementById('hint-area');
  if (el) el.style.display = showHint ? 'block' : 'none';
}

async function submitCode() {
  const code = document.getElementById('student-code')?.value.trim();
  if (!code) return;
  const area = document.getElementById('feedback-area');
  area.innerHTML = '<div class="loading-box">🤖 AI 선생님이 코드를 확인하고 있습니다...</div>';
  const lesson = lessons[currentLesson];
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-3-5-sonnet-20241022',
        max_tokens: 1000,
        messages: [{ role: 'user', content: `당신은 친절한 파이썬 선생님입니다.\n\n연습 문제: ${lesson.exercise.q}\n\n학생 코드:\n\`\`\`python\n${code}\n\`\`\`\n\n아래 형식으로 한국어로 피드백해주세요 (3~5문장):\n- 코드가 문제를 올바르게 해결했는지 여부\n- 잘된 점\n- 개선할 점 또는 다른 방법 (있다면)\n- 응원의 말\n\n이모지를 2~3개 사용해서 친근하게 작성해주세요.` }]
      })
    });
    const data = await res.json();
    if (!res.ok) {
      area.innerHTML = `<div class="error-box">API 오류: ${data.error?.message || JSON.stringify(data)}</div>`;
      return;
    }
    const text = data.content?.find(b=>b.type==='text')?.text || '피드백을 불러올 수 없습니다.';
    area.innerHTML = `<div class="feedback-box"><div class="feedback-label">🎓 AI 선생님 피드백</div><div class="feedback-text">${text.replace(/\n/g,'<br>')}</div></div>`;
  } catch(e) {
    area.innerHTML = `<div class="error-box">오류: ${e.message}</div>`;
  }
}

renderSidebar();
renderContent();
</script>
</body>
</html>
