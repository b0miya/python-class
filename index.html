<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>파이썬 기초 학습</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR', -apple-system, sans-serif; background: #f5f5f5; color: #1a1a1a; min-height: 100vh; }

    /* ── NAV ── */
    .nav { background: #fff; border-bottom: 1px solid #e0e0e0; position: sticky; top: 0; z-index: 100; }
    .nav-inner { max-width: 1100px; margin: 0 auto; padding: 0 16px; display: flex; align-items: center; gap: 4px; height: 48px; }
    .nav-logo { font-size: 14px; font-weight: 700; margin-right: 16px; color: #1a1a1a; text-decoration: none; }
    .nav-link { font-size: 13px; padding: 6px 12px; border-radius: 8px; text-decoration: none; color: #888; transition: background 0.12s; }
    .nav-link:hover { background: #f5f5f5; color: #1a1a1a; }
    .nav-link.active { background: #1a1a1a; color: #fff; }

    /* ── LAYOUT ── */
    .page { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .subtitle { font-size: 14px; color: #666; margin-bottom: 24px; }
    .wrap { display: flex; height: 720px; border: 1px solid #e0e0e0; border-radius: 12px; overflow: hidden; background: #fff; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }

    /* ── SIDEBAR ── */
    .sidebar { width: 210px; border-right: 1px solid #e0e0e0; overflow-y: auto; flex-shrink: 0; background: #fafafa; }
    .sidebar-header { padding: 14px 16px; border-bottom: 1px solid #e0e0e0; }
    .sidebar-header p { font-size: 11px; font-weight: 700; color: #999; letter-spacing: 0.06em; text-transform: uppercase; }
    .lesson-item { padding: 10px 16px; cursor: pointer; border-left: 2px solid transparent; display: flex; align-items: center; gap: 10px; transition: background 0.12s; }
    .lesson-item:hover { background: #fff; }
    .lesson-item.active { background: #fff; border-left: 2px solid #1a1a1a; }
    .lesson-icon { width: 30px; height: 30px; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; background: #fff; border: 1px solid #e0e0e0; }
    .lesson-item.active .lesson-icon { background: #1a1a1a; border-color: #1a1a1a; }
    .lesson-label { font-size: 13px; color: #1a1a1a; line-height: 1.3; font-weight: 500; }

    /* ── MAIN ── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
    .tabs { display: flex; border-bottom: 1px solid #e0e0e0; padding: 0 20px; flex-shrink: 0; background: #fff; }
    .tab-btn { border: none; background: none; padding: 13px 0; margin-right: 24px; font-size: 13px; cursor: pointer; color: #888; border-bottom: 2px solid transparent; font-weight: 400; font-family: inherit; transition: color 0.12s; }
    .tab-btn.active { color: #1a1a1a; border-bottom: 2px solid #1a1a1a; font-weight: 700; }
    .content { flex: 1; overflow-y: auto; padding: 24px 28px; }

    /* ─────────────────────────────────────────
       개념 학습 공통 스타일
    ───────────────────────────────────────── */
    .lesson-badge { display: inline-block; font-size: 11px; padding: 3px 9px; border-radius: 99px; background: #f0f0f0; color: #888; margin-bottom: 10px; }
    .lesson-title { font-size: 20px; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }

    /* 섹션 소제목 */
    .sub-title { font-size: 14px; font-weight: 700; color: #1a1a1a; margin: 24px 0 12px; display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
    .sub-title::after { content: ''; flex: 1; height: 1px; background: #e8e8e8; }
    .sub-title .ti { font-size: 11px; color: #bbb; margin-left: 4px; transition: transform 0.2s; display: inline-block; }
    .sub-title.collapsed .ti { transform: rotate(-90deg); }
    .sec-body { overflow: hidden; transition: max-height 0.3s ease; }
    .sec-body.collapsed { max-height: 0 !important; }

    /* callout */
    .callout { border-radius: 8px; padding: 12px 16px; margin: 0 0 14px; display: flex; gap: 12px; font-size: 13px; line-height: 1.75; }
    .callout-info  { background: #f0f7ff; border: 1px solid #c5deff; }
    .callout-warn  { background: #fffbec; border: 1px solid #f0e0a0; }
    .callout-tip   { background: #f0faf4; border: 1px solid #b2e0c5; }
    .callout-icon  { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
    .callout-body  { color: #555; }
    .callout-body strong { color: #1a1a1a; }
    .callout-body code { background: #eef2ff; color: #4338ca; padding: 1px 5px; border-radius: 3px; font-family: 'JetBrains Mono', monospace; font-size: 11.5px; }

    /* 인라인 강조 코드 */
    .hl-code { background: #eef2ff; color: #4338ca; padding: 1px 6px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 12px; }

    /* 코드 블록 */
    .code-wrap { margin: 0 0 14px; border-radius: 8px; overflow: hidden; border: 1px solid #e0e0e0; }
    .code-header { background: #f5f5f5; padding: 7px 14px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e0e0e0; }
    .code-filename { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #888; }
    .copy-btn { font-size: 11px; background: #fff; border: 1px solid #ddd; border-radius: 4px; padding: 2px 8px; color: #666; cursor: pointer; font-family: inherit; transition: background 0.12s; }
    .copy-btn:hover { background: #e8e8e8; }
    .copy-btn.copied { background: #e8f5e9; border-color: #a5d6a7; color: #2e7d32; }
    pre.code-block { background: #f8f8f8; padding: 14px 16px; font-family: 'JetBrains Mono', monospace; font-size: 12.5px; line-height: 1.75; overflow-x: auto; color: #1a1a1a; margin: 0; }
    .kw  { color: #d73a49; } .fn  { color: #6f42c1; } .str { color: #032f62; }
    .num { color: #005cc5; } .cmt { color: #6a737d; font-style: italic; }
    .var { color: #e36209; } .op  { color: #1a1a1a; } .cls { color: #e36209; font-weight: 600; }

    /* 실행 결과 */
    .output-box { background: #f0fff4; border: 1px solid #c3e6cb; border-left: 3px solid #28a745; border-radius: 0 6px 6px 0; padding: 10px 14px; margin: -10px 0 14px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #155724; }
    .out-label { font-size: 10px; color: #888; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; font-family: 'Noto Sans KR', sans-serif; }

    /* 테이블 */
    .table-wrap { overflow-x: auto; margin: 0 0 14px; }
    .table-wrap table, table.data-table { width: 100%; border-collapse: collapse; font-size: 13px; border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden; }
    .table-wrap table th, table.data-table th { background: #f5f5f5; padding: 9px 12px; text-align: left; font-size: 11px; font-weight: 700; color: #666; letter-spacing: 0.05em; text-transform: uppercase; border-bottom: 1px solid #e0e0e0; }
    .table-wrap table td, table.data-table td { padding: 9px 12px; border-bottom: 1px solid #f0f0f0; color: #333; }
    .table-wrap table tr:last-child td, table.data-table tr:last-child td { border-bottom: none; }
    .table-wrap table tr:hover td, table.data-table tr:hover td { background: #fafafa; }
    .table-wrap table td code, table.data-table td code { background: #eef2ff; color: #3730a3; padding: 1px 5px; border-radius: 3px; font-family: 'JetBrains Mono', monospace; font-size: 11.5px; }

    /* 카드 그리드 */
    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; margin: 0 0 16px; }
    .card { background: #fafafa; border: 1px solid #e8e8e8; border-radius: 10px; padding: 18px; position: relative; overflow: hidden; transition: box-shadow 0.15s; }
    .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--ca, #e0e0e0); border-radius: 10px 10px 0 0; }
    .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
    .card h3 { font-size: 14px; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
    .card p { font-size: 13px; color: #555; line-height: 1.7; }
    .card code { background: #eef2ff; color: #4338ca; padding: 1px 4px; border-radius: 3px; font-family: 'JetBrains Mono', monospace; font-size: 11.5px; }

    /* two-col */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin: 0 0 14px; }
    @media (max-width: 600px) { .two-col { grid-template-columns: 1fr; } }

    /* 제어구조 카드 */
    .ctrl-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin: 0 0 16px; }
    .ctrl-card { background: #fafafa; border: 1px solid #e8e8e8; border-radius: 8px; overflow: hidden; }
    .ctrl-card-head { padding: 11px 14px; font-weight: 700; font-size: 13px; display: flex; align-items: center; gap: 7px; border-bottom: 1px solid #e8e8e8; }
    .ctrl-card-body { padding: 11px 14px; font-size: 13px; color: #666; line-height: 1.7; }
    .ctrl-card-body code { background: #eef2ff; color: #4338ca; padding: 1px 4px; border-radius: 3px; font-family: 'JetBrains Mono', monospace; font-size: 11.5px; }

    /* 연산자 칩 */
    .op-row { display: flex; flex-wrap: wrap; gap: 8px; margin: 0 0 12px; }
    .op-chip { background: #fff; border: 1px solid #e0e0e0; border-radius: 7px; padding: 6px 12px; font-family: 'JetBrains Mono', monospace; font-size: 12.5px; color: #c55; display: flex; align-items: center; gap: 6px; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
    .op-chip span { color: #888; font-size: 12px; font-family: 'Noto Sans KR', sans-serif; }

    /* 진리표 */
    .truth-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 0 0 14px; }
    .truth-table { border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden; font-size: 12px; }
    .truth-table th { background: #f5f5f5; padding: 7px 10px; color: #666; font-size: 11px; font-weight: 700; border-bottom: 1px solid #e0e0e0; text-align: center; }
    .truth-table td { padding: 7px 10px; border-bottom: 1px solid #f0f0f0; font-family: 'JetBrains Mono', monospace; text-align: center; }
    .truth-table tr:last-child td { border-bottom: none; }
    .t-true  { color: #166534; font-weight: 700; }
    .t-false { color: #991b1b; font-weight: 700; }

    /* 흐름도 */
    .flow { display: flex; align-items: center; flex-wrap: wrap; gap: 0; background: #fafafa; border: 1px solid #e8e8e8; border-radius: 10px; padding: 16px; margin: 0 0 14px; justify-content: center; }
    .flow-step { background: #fff; border: 1px solid #e0e0e0; border-radius: 7px; padding: 10px 14px; font-size: 12px; font-weight: 600; text-align: center; min-width: 90px; }
    .flow-step small { display: block; font-size: 10px; color: #999; margin-top: 2px; font-weight: 400; }
    .flow-step.hl { border-color: #6366f1; background: #eef2ff; color: #4f46e5; }
    .flow-arrow { color: #ccc; font-size: 16px; padding: 0 4px; }

    /* 다음 버튼 */
    .next-btn-wrap { margin-top: 28px; padding-top: 20px; border-top: 1px solid #e8e8e8; display: flex; gap: 8px; }

    /* ── 연습 문제 스타일 ── */
    .badge { display: inline-block; font-size: 11px; padding: 3px 9px; border-radius: 99px; background: #f0f0f0; color: #888; margin-bottom: 14px; }
    .q-box { background: #f8f8f8; border: 1px solid #e8e8e8; border-radius: 8px; padding: 14px 16px; font-size: 13px; line-height: 1.75; margin-bottom: 16px; }
    .hint-box { background: #fffbec; border: 1px solid #f0e0a0; border-radius: 8px; padding: 10px 14px; font-size: 13px; color: #7a5f00; margin-bottom: 14px; }
    textarea.code-input { width: 100%; min-height: 150px; font-family: 'JetBrains Mono', monospace; font-size: 12px; line-height: 1.7; padding: 12px 14px; border-radius: 8px; border: 1px solid #ddd; background: #f8f8f8; color: #1a1a1a; resize: vertical; outline: none; transition: border 0.15s; }
    textarea.code-input:focus { border-color: #1a1a1a; background: #fff; }
    .btn-row { display: flex; gap: 8px; margin-top: 12px; }
    button { padding: 8px 16px; border-radius: 8px; border: 1px solid #ddd; background: #fff; font-size: 13px; cursor: pointer; color: #1a1a1a; transition: background 0.12s; font-family: inherit; }
    button:hover { background: #f0f0f0; }
    button.primary { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
    button.primary:hover { background: #333; }
    .feedback-box { margin-top: 16px; background: #f0faf4; border: 1px solid #b2e0c5; border-radius: 8px; padding: 14px 16px; }
    .feedback-label { font-size: 12px; font-weight: 700; color: #1e7a44; margin-bottom: 6px; }
    .feedback-text { font-size: 13px; line-height: 1.75; color: #1e5c33; }
    .error-box { margin-top: 16px; background: #fff0f0; border: 1px solid #ffc0c0; border-radius: 8px; padding: 14px 16px; font-size: 13px; color: #c00; }
    .loading-box { padding: 14px 0; font-size: 13px; color: #888; }

    @media (max-width: 700px) {
      .truth-grid { grid-template-columns: 1fr; }
      .wrap { height: auto; flex-direction: column; }
      .sidebar { width: 100%; height: 130px; border-right: none; border-bottom: 1px solid #e0e0e0; display: flex; overflow-x: auto; }
      .sidebar-header { display: none; }
    }
  </style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a class="nav-logo" href="/">🐍 Python Class</a>
    <a class="nav-link active" href="/index.html">파이썬 학습</a>
    <a class="nav-link" href="/guide.html">배포 가이드</a>
  </div>
</nav>
<div class="page">
  <h1>🐍 파이썬 기초 학습</h1>
  <p class="subtitle">개념을 배우고, 직접 코드를 작성해 AI 피드백을 받아보세요</p>
  <div class="wrap">
    <div class="sidebar">
      <div class="sidebar-header"><p>커리큘럼</p></div>
      <div id="lesson-list"></div>
    </div>
    <div class="main">
      <div class="tabs">
        <button class="tab-btn active" id="tab-learn" onclick="switchTab('learn')">개념 학습</button>
        <button class="tab-btn" id="tab-exercise" onclick="switchTab('exercise')">연습 문제</button>
      </div>
      <div class="content" id="main-content"></div>
    </div>
  </div>
</div>

<script>
/* ─────────────────────────────────────────
   헬퍼 함수
───────────────────────────────────────── */
function cb(filename, code) {
  const id = 'c' + Math.random().toString(36).slice(2,8);
  return `<div class="code-wrap">
    <div class="code-header">
      <span class="code-filename">${filename}</span>
      <button class="copy-btn" onclick="copyCode('${id}',this)">복사</button>
    </div>
    <pre class="code-block" id="${id}">${code}</pre>
  </div>`;
}

function sec(text) {
  return `<div class="sub-title" onclick="toggleSec(this)">${text}<span class="ti">▼</span></div><div class="sec-body">`;
}
const end = `</div>`;

/* ─────────────────────────────────────────
   레슨 데이터 (8단원)
───────────────────────────────────────── */
const lessons = [

/* ════════════════════════════════════════
   01. 문제 해결 과정 & 개발 환경
════════════════════════════════════════ */
{ id:1, label:"문제 해결 & 개발환경", icon:"🗺️",
  learnHTML: () => `
    <p style="color:#666;margin-bottom:16px;font-size:13px;">복잡한 문제를 해결하기 위해서는 체계적인 단계를 따라 프로그램을 작성합니다.</p>

    ${sec('🗺️ 문제 해결 과정')}
    <div class="flow">
      <div class="flow-step hl">문제 이해<br>및 분석<small>초기·목표 상태 파악</small></div>
      <div class="flow-arrow">→</div>
      <div class="flow-step">추상화<small>핵심 요소 추출</small></div>
      <div class="flow-arrow">→</div>
      <div class="flow-step">알고리즘<br>설계<small>자연어·순서도</small></div>
      <div class="flow-arrow">→</div>
      <div class="flow-step hl">프로그래밍<small>명령어로 구현</small></div>
      <div class="flow-arrow">→</div>
      <div class="flow-step">디버깅<small>오류 수정</small></div>
    </div>
    ${end}

    ${sec('🖥️ 개발 환경 & 핵심 개념')}
    <div class="card-grid">
      <div class="card" style="--ca:#3b82f6">
        <h3>🖥️ 개발 환경 (IDE)</h3>
        <p>Python IDLE, <strong>Thonny</strong>, <strong>Visual Studio Code</strong> 등 다양한 도구를 사용합니다. 온라인 환경으로는 <strong>Google Colab</strong>도 많이 활용됩니다.</p>
      </div>
      <div class="card" style="--ca:#22c55e">
        <h3>💻 컴퓨터 동작 원리</h3>
        <p><strong>HDD/SSD</strong>(창고) → <strong>RAM</strong>(책상 위) → <strong>CPU</strong>(일하는 사람) 순으로 프로그램이 실행됩니다. 전원을 끄면 RAM의 내용은 사라집니다.</p>
      </div>
      <div class="card" style="--ca:#a855f7">
        <h3>⚙️ 프로그래밍 핵심 요소</h3>
        <p>리스트, <strong>중첩 제어 구조</strong>, <strong>함수</strong>를 활용하여 실생활 문제를 프로그램으로 구현합니다.</p>
      </div>
    </div>
    ${end}
  `,
  exercise: { q: "다음 문제를 해결하는 알고리즘을 자연어(한국어 문장)로 단계별로 작성하고, 파이썬 코드로도 구현해 보세요.\n\n문제: 1부터 10까지 숫자 중 홀수만 출력하기", hint: "range(1, 11, 2) 처럼 range의 세 번째 인자를 활용하거나, if i % 2 != 0: 조건을 사용해 보세요." }
},

/* ════════════════════════════════════════
   02. 변수와 자료형
════════════════════════════════════════ */
{ id:2, label:"변수와 자료형", icon:"📦",
  learnHTML: () => `
    <div class="callout callout-info">
      <span class="callout-icon">💡</span>
      <div class="callout-body">
        <strong>변수(Variable)</strong>란 어떤 값을 저장하고 나중에 참조하기 위한 <strong>기억 장소</strong>입니다. 대입 연산자 <span class="hl-code">=</span>를 사용해 값을 저장합니다.
      </div>
    </div>

    ${sec('📋 파이썬 자료형 종류')}
    <div class="table-wrap"><table>
      <thead><tr><th>구분</th><th>자료형</th><th>예시</th><th>특징</th></tr></thead>
      <tbody>
        <tr><td>단일형</td><td><strong>정수형</strong> int</td><td><code>-100, 0, 100</code></td><td>소수점이 없는 정수</td></tr>
        <tr><td>단일형</td><td><strong>실수형</strong> float</td><td><code>-3.5, 1.246</code></td><td>소수점이 포함된 실수</td></tr>
        <tr><td>단일형</td><td><strong>문자열형</strong> str</td><td><code>'hello', "정보"</code></td><td>따옴표로 감싸서 표현</td></tr>

        <span class="var">self</span>.year   <span class="op">=</span> <span class="var">year</span>

<span class="cmt"># 객체(인스턴스) 생성</span>
<span class="var">book1</span> <span class="op">=</span> <span class="cls">Book</span>(<span class="str">'톰소여의 모험'</span>, <span class="str">'마크 트웨인'</span>, <span class="num">1876</span>)
<span class="var">book2</span> <span class="op">=</span> <span class="cls">Book</span>(<span class="str">'데미안'</span>,       <span class="str">'헤르만 헤세'</span>,  <span class="num">1919</span>)

<span class="fn">print</span>(<span class="var">book1</span>.title, <span class="var">book1</span>.author, <span class="var">book1</span>.year)
<span class="fn">print</span>(<span class="var">book2</span>.title, <span class="var">book2</span>.author, <span class="var">book2</span>.year)`)}
    <div class="output-box"><div class="out-label">▶ 실행 결과</div>
톰소여의 모험 마크 트웨인 1876<br>데미안 헤르만 헤세 1919</div>
    ${end}

    ${sec('클래스 완성 예제 — 도서 대여 시스템')}
    ${cb('Book & Student 클래스', `<span class="kw">class</span> <span class="cls">Book</span>:
    <span class="kw">def</span> <span class="fn">__init__</span>(<span class="var">self</span>, <span class="var">title</span>, <span class="var">author</span>):
        <span class="var">self</span>.title     <span class="op">=</span> <span class="var">title</span>
        <span class="var">self</span>.author    <span class="op">=</span> <span class="var">author</span>
        <span class="var">self</span>.is_rented <span class="op">=</span> <span class="kw">False</span>

<span class="kw">class</span> <span class="cls">Student</span>:
    <span class="kw">def</span> <span class="fn">__init__</span>(<span class="var">self</span>, <span class="var">id</span>, <span class="var">name</span>):
        <span class="var">self</span>.id           <span class="op">=</span> <span class="var">id</span>
        <span class="var">self</span>.name         <span class="op">=</span> <span class="var">name</span>
        <span class="var">self</span>.rented_books <span class="op">=</span> []

    <span class="kw">def</span> <span class="fn">rent_book</span>(<span class="var">self</span>, <span class="var">book</span>):
        <span class="kw">if not</span> <span class="var">book</span>.is_rented:
            <span class="var">book</span>.is_rented <span class="op">=</span> <span class="kw">True</span>
            <span class="var">self</span>.rented_books.append(<span class="var">book</span>)
            <span class="kw">return</span> f<span class="str">'{self.name}에게 {book.title} 대여함.'</span>
        <span class="kw">else</span>:
            <span class="kw">return</span> f<span class="str">'{book.title} 대여 중.'</span>

<span class="var">b1</span> <span class="op">=</span> <span class="cls">Book</span>(<span class="str">'소나기'</span>, <span class="str">'황순원'</span>)
<span class="var">s1</span> <span class="op">=</span> <span class="cls">Student</span>(<span class="num">1</span>, <span class="str">'홍길동'</span>)
<span class="fn">print</span>(<span class="var">s1</span>.rent_book(<span class="var">b1</span>))   <span class="cmt"># → 홍길동에게 소나기 대여함.</span>
<span class="var">s2</span> <span class="op">=</span> <span class="cls">Student</span>(<span class="num">2</span>, <span class="str">'이순신'</span>)
<span class="fn">print</span>(<span class="var">s2</span>.rent_book(<span class="var">b1</span>))   <span class="cmt"># → 소나기 대여 중.</span>`)}
    ${end}

    <div class="callout callout-tip">
      <span class="callout-icon">📝</span>
      <div class="callout-body">
        <strong>핵심 용어 정리</strong><br>
        • <strong>클래스(Class)</strong>: 객체를 만드는 설계도<br>
        • <strong>인스턴스(Instance)</strong>: 메모리에 실체화된 객체<br>
        • <strong>메소드(Method)</strong>: 클래스 안에 정의된 함수<br>
        • <strong>생성자(__init__)</strong>: 객체 생성 시 자동으로 호출되는 메소드<br>
        • <strong>self</strong>: 인스턴스 자기 자신을 가리키는 참조
      </div>
    </div>
  `,
  exercise: { q: "Animal 클래스를 만들어 보세요.\n- 속성: name(이름), sound(울음소리)\n- 메소드: speak() → '{name}이(가) {sound}!' 출력\n\n강아지, 고양이 인스턴스를 만들어 speak()를 호출하세요.", hint: "class Animal: 으로 시작하고 __init__(self, name, sound):로 속성을 초기화하세요. speak()에서 print(f'{self.name}이(가) {self.sound}!')를 써보세요." }
}

]; // lessons end

/* ─────────────────────────────────────────
   상태 및 인터랙션
───────────────────────────────────────── */
let currentLesson = 0, currentTab = 'learn', showHint = false;

function copyCode(id, btn) {
  const pre = document.getElementById(id);
  navigator.clipboard.writeText(pre ? pre.innerText : '').then(() => {
    btn.textContent = '✓ 복사됨'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '복사'; btn.classList.remove('copied'); }, 1800);
  }).catch(() => { btn.textContent = '실패'; setTimeout(() => { btn.textContent = '복사'; }, 1500); });
}

function toggleSec(el) {
  el.classList.toggle('collapsed');
  const body = el.nextElementSibling;
  if (!body) return;
  if (body.classList.contains('collapsed')) {
    body.style.maxHeight = body.scrollHeight + 'px';
    body.classList.remove('collapsed');
  } else {
    body.style.maxHeight = body.scrollHeight + 'px';
    requestAnimationFrame(() => body.classList.add('collapsed'));
  }
}

function initSections() {
  document.querySelectorAll('.sec-body').forEach(b => { b.style.maxHeight = b.scrollHeight + 'px'; });
}

/* ─────────────────────────────────────────
   렌더링
───────────────────────────────────────── */
function renderSidebar() {
  document.getElementById('lesson-list').innerHTML = lessons.map((l, i) => `
    <div class="lesson-item ${i===currentLesson?'active':''}" onclick="selectLesson(${i})">
      <div class="lesson-icon">${l.icon}</div>
      <span class="lesson-label">${l.label}</span>
    </div>`).join('');
}

function switchTab(tab) {
  currentTab = tab;
  ['learn','exercise'].forEach(t => {
    document.getElementById('tab-'+t).className = 'tab-btn' + (tab===t ? ' active' : '');
  });
  renderContent();
}

function selectLesson(i) {
  currentLesson = i; showHint = false;
  renderSidebar(); switchTab('learn');
}

function renderContent() {
  const lesson = lessons[currentLesson];
  const el = document.getElementById('main-content');

  if (currentTab === 'learn') {
    el.innerHTML = `
      <span class="lesson-badge">단원 ${currentLesson+1} / ${lessons.length}</span>
      <div class="lesson-title">${lesson.icon} ${lesson.label}</div>
      ${lesson.learnHTML()}
      <div class="next-btn-wrap">
        <button class="primary" onclick="switchTab('exercise')">연습 문제 풀기 →</button>
      </div>`;
    setTimeout(initSections, 10);
  } else {
    el.innerHTML = `
      <span class="badge">✏️ 연습 문제</span>
      <div class="lesson-title">${lesson.icon} ${lesson.label}</div>
      <div class="q-box">${lesson.exercise.q.replace(/\n/g,'<br>')}</div>
      <div id="hint-area" style="display:${showHint?'block':'none'}">
        <div class="hint-box">💡 힌트: ${lesson.exercise.hint}</div>
      </div>
      <textarea class="code-input" id="student-code" placeholder="# 여기에 파이썬 코드를 작성하세요&#10;"></textarea>
      <div class="btn-row">
        <button class="primary" onclick="submitCode()">채점하기</button>
        <button onclick="toggleHint()">힌트 보기</button>
      </div>
      <div id="feedback-area"></div>`;
  }
}

function toggleHint() {
  showHint = !showHint;
  const el = document.getElementById('hint-area');
  if (el) el.style.display = showHint ? 'block' : 'none';
}

async function submitCode() {
  const code = document.getElementById('student-code')?.value.trim();
  if (!code) return;
  const area = document.getElementById('feedback-area');
  area.innerHTML = '<div class="loading-box">🤖 AI 선생님이 코드를 확인하고 있습니다...</div>';
  const lesson = lessons[currentLesson];
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-3-5-sonnet-20241022',
        max_tokens: 1000,
        messages: [{ role: 'user', content: `당신은 친절한 파이썬 선생님입니다.\n\n연습 문제: ${lesson.exercise.q}\n\n학생 코드:\n\`\`\`python\n${code}\n\`\`\`\n\n아래 형식으로 한국어로 피드백해주세요 (3~5문장):\n- 코드가 문제를 올바르게 해결했는지 여부\n- 잘된 점\n- 개선할 점 또는 다른 방법 (있다면)\n- 응원의 말\n\n이모지를 2~3개 사용해서 친근하게 작성해주세요.` }]
      })
    });
    const data = await res.json();
    if (!res.ok) { area.innerHTML = `<div class="error-box">API 오류: ${data.error?.message || JSON.stringify(data)}</div>`; return; }
    const text = data.content?.find(b=>b.type==='text')?.text || '피드백을 불러올 수 없습니다.';
    area.innerHTML = `<div class="feedback-box"><div class="feedback-label">🎓 AI 선생님 피드백</div><div class="feedback-text">${text.replace(/\n/g,'<br>')}</div></div>`;
  } catch(e) {
    area.innerHTML = `<div class="error-box">오류: ${e.message}</div>`;
  }
}

renderSidebar();
renderContent();
</script>
</body>
</html>
